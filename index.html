<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Virtual Axolotl</title>
  </head>
  <body>
    <main class="container">

      <div class="startpage" id="startp">
        <p>Virtual Axolotl</p>
        <button id="startBtn">Start Game</button>
      </div>

      <img id="petImage" src="assets/Happy_Axel_Tamagotchi.GIF" alt="Virtual Pet" />
      <div class="pet-status" id="stats">
        <p>
          Hunger: <span id="hunger">5</span>
          <div class="bar"><div id="hungerBar"></div></div>
        </p>
        <p>
          Energy: <span id="energy">5</span>
          <div class="bar"><div id="energyBar"></div></div>
        </p>
        <p>
          Happiness: <span id="happiness">5</span>
          <div class="bar"><div id="happinessBar"></div></div>
        </p>
        <div class="right-panel actions">
          <button2 id="restartBtn">Reset</button2>
          <button2 id="pauseBtn">Pause</button2>
        </div>
      </div>

      

      <div class="bottom-panel">
        <div class="actions">
          <button id="feedBtn">Feed</button>
          <button id="playBtn">Play</button>
          <button id="restBtn">Rest</button>
          <button id="reportBtn">Get report</button>
        </div>
      </div>
      <div id="healthReport" class="health-report"></div>

      <div class="big-button">
        <button id="bigRestart">Restart</button>
      </div>

      <div class="death-message" id="deathMessage"></div>


    </main>
    <script src="script.js"></script>
  </body>
</html>
